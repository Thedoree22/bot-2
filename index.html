<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NorthCraft | Official Checkout</title>
    <style>
        :root {
            --primary-gold: #ffcc00;
            --dark-bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --text-color: #e0e0e0;
            --accent-blue: #00aaff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 40px 0;
            text-align: center;
            background: linear-gradient(to bottom, #1a1a1a, #0f0f0f);
            border-bottom: 2px solid var(--primary-gold);
            margin-bottom: 30px;
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 3px;
            color: var(--primary-gold);
            text-transform: uppercase;
        }

        .container {
            max-width: 1200px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            padding: 20px;
            width: 90%;
        }

        .staff-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid #333;
            cursor: pointer;
        }

        .staff-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(255, 204, 0, 0.1);
            border-color: var(--primary-gold);
        }

        .avatar {
            width: 80px;
            height: 80px;
            background: #333;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            border: 2px solid var(--accent-blue);
        }

        .staff-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            display: block;
        }

        .btn-claim {
            background-color: var(--primary-gold);
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-claim:hover {
            background-color: #e6b800;
        }

        /* Modal / Alert Box */
        #notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #222;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid var(--primary-gold);
            text-align: center;
            z-index: 1000;
            display: none;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            min-width: 300px;
        }

        #notification h2 {
            color: var(--primary-gold);
            margin-top: 0;
        }

        #notification button {
            margin-top: 20px;
            padding: 10px 25px;
            background: var(--accent-blue);
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            z-index: 999;
        }
    </style>
</head>
<body>

<header>
    <h1>NorthCraft Official Checkout</h1>
    <p>Staff Payroll Management System v2.1</p>
</header>

<div class="container">
    <div class="staff-card" onclick="processPayment('Saddler')">
        <div class="avatar">👤</div>
        <span class="staff-name">†𝙎𝙖𝙙𝙙𝙡𝙚𝙧†</span>
        <button class="btn-claim">Claim Salary</button>
    </div>

    <div class="staff-card" onclick="processPayment('Teddy')">
        <div class="avatar">👑</div>
        <span class="staff-name">Teddy</span>
        <button class="btn-claim">Claim Salary</button>
    </div>

    <div class="staff-card" onclick="processPayment('Yama')">
        <div class="avatar">👤</div>
        <span class="staff-name">Yama</span>
        <button class="btn-claim">Claim Salary</button>
    </div>

    <div class="staff-card" onclick="processPayment('Redex550')">
        <div class="avatar">👤</div>
        <span class="staff-name">Redex550</span>
        <button class="btn-claim">Claim Salary</button>
    </div>

    <div class="staff-card" onclick="processPayment('Tokiomon')">
        <div class="avatar">👤</div>
        <span class="staff-name">Tokiomon</span>
        <button class="btn-claim">Claim Salary</button>
    </div>

    <div class="staff-card" onclick="processPayment('Miqa')">
        <div class="avatar">⚔️</div>
        <span class="staff-name">Miqa</span>
        <button class="btn-claim">Claim Salary</button>
    </div>

    <div class="staff-card" onclick="processPayment('Uncle')">
        <div class="avatar">🔱</div>
        <span class="staff-name">Uncle</span>
        <button class="btn-claim">Claim Salary</button>
    </div>
</div>

<div class="overlay" id="overlay"></div>
<div id="notification">
    <h2 id="modalTitle">Transaction Details</h2>
    <p id="modalMessage"></p>
    <button onclick="closeModal()">Close</button>
</div>

<script>
    function processPayment(name) {
        const modal = document.getElementById('notification');
        const overlay = document.getElementById('overlay');
        const message = document.getElementById('modalMessage');
        const title = document.getElementById('modalTitle');

        let output = "";
        
        // Logic for specific staff
        if (name === 'Saddler') {
            output = "თქვენ დაგერიცხათ ხელფასი 220.20 ლარი ! ანგარიშზე ნომრით - Sdlr432";
        } 
        else if (['Teddy', 'Yama', 'Redex550', 'Tokiomon'].includes(name)) {
            output = "თქვენი ხელფასი/პრემია აღებულია Teddy - ს მიერ";
        } 
        else if (name === 'Uncle') {
            output = "Uncle-ს ნასკი გადაუხადეთ ხელფასად!";
            title.innerText = "Special Notice";
        } 
        else {
            // Random salary for others (e.g., Miqa)
            const randomSalary = (Math.random() * (1000 - 200) + 200).toFixed(2);
            output = `თქვენ დაგერიცხათ ხელფასი ${randomSalary} ლარი ! ანგარიშზე ნომრით - NC-${Math.floor(Math.random() * 10000)}`;
        }

        message.innerText = output;
        modal.style.display = 'block';
        overlay.style.display = 'block';
    }

    function closeModal() {
        document.getElementById('notification').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('modalTitle').innerText = "Transaction Details";
    }
</script>

</body>
</html>
